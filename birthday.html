<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      color: #fff; text-decoration: none;
    }

    body {
      overflow-x: hidden;
      background: #1e1b4b;
      font-family: 'Dancing Script', cursive, serif;
    }

    /* ── Fireworks canvas (fixed, always on top) ─── */
    #fwCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Horizontal transition zone ──────────────── */
    /* S1 + S2 live inside one sticky container.
       Scrolling through the 300vh wrapper slides
       S1 out to the right and S2 in from the left. */
    .h-wrapper {
      position: relative;
      height: 300vh;      /* 100vh visible + 200vh scroll room */
    }

    .h-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }

    /* Purple */
    .s1-panel {
      background: linear-gradient(150deg, #12013d 0%, #3b0764 50%, #6d28d9 100%);
    }

    /* Blue – starts hidden to the LEFT */
    .s2-panel {
      background: linear-gradient(150deg, #0c2a4e 0%, #0369a1 60%, #38bdf8 100%);
      transform: translateX(-100vw);
    }

    /* ── Section 3 (normal vertical) ─────────────── */
    .s3 {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, #052e16 0%, #065f46 55%, #059669 100%);
    }

    /* ── Typography ──────────────────────────────── */
    h1 {
      font-size: clamp(2.8rem, 7vw, 7rem);
      text-align: center;
      padding: 2rem;
      line-height: 1.3;
      text-shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
    }

    .typewrite > .wrap {
      border-right: 0.08em solid #fff;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* ── Scroll hint ─────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      font-family: sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      opacity: 0.45;
      transition: opacity 0.3s;
      animation: sbounce 2.2s ease-in-out infinite;
    }

    @keyframes sbounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(8px); }
    }
  </style>
</head>
<body>

  <!-- Fireworks canvas -->
  <canvas id="fwCanvas"></canvas>

  <!-- ── Horizontal zone: S1 slides right, S2 slides in from left ── -->
  <div class="h-wrapper" id="hWrapper">
    <div class="h-sticky">

      <!-- S1: Честит рожден ден (purple) -->
      <div class="panel s1-panel" id="s1Panel">
        <h1>
          <a class="typewrite" id="tw1" data-type='["Честит рожден ден"]'>
            <span class="wrap"></span>
          </a>
        </h1>
        <div class="scroll-hint" id="scrollHint">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
          scroll
        </div>
      </div>

      <!-- S2: Ти си прекрасен човек (blue) -->
      <div class="panel s2-panel" id="s2Panel">
        <h1>
          <a class="typewrite" id="tw2" data-type='["Ти си прекрасен човек"]'>
            <span class="wrap"></span>
          </a>
        </h1>
      </div>

    </div>
  </div>

  <!-- ── Section 3: Бъди щастлива (green) ── -->
  <section class="s3">
    <h1>
      <a class="typewrite" id="tw3" data-type='["Бъди щастлива"]'>
        <span class="wrap"></span>
      </a>
    </h1>
  </section>

  <script>
    // ── Typewriter (type once, keep blinking cursor) ──────────
    function TxtType(el, text, onDone) {
      this.el = el; this.txt = text; this.cur = '';
      this.done = false; this.cb = onDone || null;
      this._tick();
    }

    TxtType.prototype._tick = function() {
      if (this.done) return;
      this.cur = this.txt.substring(0, this.cur.length + 1);
      this.el.innerHTML = '<span class="wrap">' + this.cur + '</span>';
      if (this.cur === this.txt) {
        this.done = true;
        if (this.cb) this.cb();
        return;
      }
      var t = this;
      setTimeout(function() { t._tick(); }, 125 + Math.random() * 85);
    };

    var started = {};
    function startTW(id, cb) {
      if (started[id]) return;
      started[id] = true;
      var el  = document.getElementById(id);
      var txt = JSON.parse(el.getAttribute('data-type'))[0];
      new TxtType(el, txt, cb);
    }

    // ── Fireworks ─────────────────────────────────────────────
    var cvs = document.getElementById('fwCanvas');
    var ctx = cvs.getContext('2d');
    var pts = [];
    var running = false;

    function resizeCvs() {
      cvs.width  = window.innerWidth;
      cvs.height = window.innerHeight;
    }
    resizeCvs();
    window.addEventListener('resize', resizeCvs);

    function burst(x, y) {
      var clrs = ['#FFD700','#FF6B6B','#FF69B4','#87CEEB','#ffffff','#FFA500','#B8FFB8','#DDA0DD','#FFE066'];
      for (var i = 0; i < 30; i++) {
        var a = (Math.PI * 2 * i / 30) + (Math.random() - 0.5) * 0.35;
        var sp = 3.5 + Math.random() * 6.5;
        pts.push({
          x: x, y: y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 1.2,
          life: 1,
          decay: 0.011 + Math.random() * 0.011,
          color: clrs[~~(Math.random() * clrs.length)],
          size: 3 + Math.random() * 4
        });
      }
      if (!running) { running = true; fwLoop(); }
    }

    function fwLoop() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      var alive = false;
      for (var i = 0; i < pts.length; i++) {
        var p = pts[i];
        if (p.life <= 0) continue;
        alive = true;
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.13;   /* gravity */
        p.vx *= 0.985;  /* drag */
        p.life -= p.decay;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (alive) requestAnimationFrame(fwLoop);
      else { running = false; pts = []; }
    }

    function launchFW() {
      var rect = document.getElementById('tw1').getBoundingClientRect();
      var cx   = rect.left + rect.width  / 2;
      var cy   = rect.top  + rect.height / 2;

      /* 3 bursts: left of text, right of text, above text */
      [
        { x: cx - rect.width * 0.46, y: cy,                delay: 0   },
        { x: cx + rect.width * 0.46, y: cy,                delay: 300 },
        { x: cx,                      y: cy - rect.height * 0.9, delay: 600 }
      ].forEach(function(b) {
        setTimeout(function() { burst(b.x, b.y); }, b.delay);
      });
    }

    // ── Start S1 typewriter on load, fire fireworks after ─────
    window.addEventListener('load', function() {
      startTW('tw1', function() {
        setTimeout(launchFW, 350);
      });
    });

    // ── Horizontal scroll: S1 → right, S2 ← left ─────────────
    var s1    = document.getElementById('s1Panel');
    var s2    = document.getElementById('s2Panel');
    var hint  = document.getElementById('scrollHint');
    var tw2ok = false;

    window.addEventListener('scroll', function() {
      var sy  = window.scrollY || window.pageYOffset;
      var vw  = window.innerWidth;
      /* 300vh wrapper - 100vh sticky = 200vh of scroll travel */
      var p   = Math.min(1, Math.max(0, sy / (window.innerHeight * 2)));

      s1.style.transform = 'translateX(' +  (p * vw)       + 'px)';
      s2.style.transform = 'translateX(' + ((p - 1) * vw)  + 'px)';

      /* fade out scroll hint quickly */
      hint.style.opacity = Math.max(0, 0.45 - p * 4).toString();

      /* start S2 typewriter when panel is 75% in view */
      if (p >= 0.75 && !tw2ok) {
        tw2ok = true;
        startTW('tw2');
      }
    }, { passive: true });

    // ── S3 typewriter fires when section enters viewport ──────
    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        startTW('tw3');
        obs.disconnect();
      }
    }, { threshold: 0.35 });
    obs.observe(document.querySelector('.s3'));
  </script>

</body>
</html>
