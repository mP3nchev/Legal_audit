services:
  - type: web
    name: toc-audit-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    # ── IMPORTANT: persistent disk keeps SQLite data across redeploys ──────────
    # Without this, the database is wiped on every restart and audits are lost.
    disk:
      name: toc-audit-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: /data/toc_audit.db
      - key: PORT
        fromService:
          type: web
          name: toc-audit-backend
          property: port
      # Set these in Render dashboard (mark as Secret):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
