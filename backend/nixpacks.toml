# Nixpacks build configuration for Railway
# When nixPkgs is specified it REPLACES auto-detected packages, so nodejs_22
# must be listed explicitly alongside the build tools needed for node-gyp.
# Node 22 LTS also has prebuilt better-sqlite3 binaries, avoiding compilation.

[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake"]
